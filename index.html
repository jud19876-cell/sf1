<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>신세계푸드 Daily FoodIntel</title>
    <!-- 폰트 적용 (Pretendard) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        :root {
            --bg-color: #F5F7FA;
            --card-bg: #FFFFFF;
            --text-main: #111111;
            --text-sub: #555555;
            --text-muted: #888888;
            --point-red: #E3000F;
            --point-black: #000000;
            --card-radius: 16px;
            --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
            --shadow-hover: 0 20px 25px -5px rgba(0, 0, 0, 0.08), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px;
            padding-top: 48px;
            padding-bottom: 80px;
        }

        /* Header */
        .header {
            margin-bottom: 36px;
            animation: fadeInDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 0 0 10px 0;
        }

        .header p {
            font-size: 16px;
            color: var(--text-sub);
            margin: 0;
            font-weight: 500;
        }

        /* Shared Card Styles */
        .card {
            background: var(--card-bg);
            border-radius: var(--card-radius);
            padding: 24px 28px;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
            transition: var(--transition);
            margin-bottom: 24px;
        }

        /* AI Briefing Card */
        .ai-card {
            border-left: 6px solid var(--point-red);
            animation: fadeInUp 0.7s ease-out;
        }

        .ai-card h2 {
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 4px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .date {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: block;
        }

        .briefing-list {
            list-style: none;
            padding: 0;
            margin: 0 0 24px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .briefing-list li {
            position: relative;
        }

        .briefing-list a {
            font-size: 16px;
            color: var(--text-main);
            line-height: 1.5;
            font-weight: 500;
            padding-left: 18px;
            text-decoration: none;
            display: block;
            transition: color 0.2s;
        }

        .briefing-list a:hover {
            color: var(--point-red);
            text-decoration: underline;
        }

        .briefing-list a::before {
            content: '';
            position: absolute;
            left: 0;
            top: 10px;
            width: 6px;
            height: 6px;
            background-color: var(--point-red);
            border-radius: 50%;
            opacity: 0.9;
        }

        /* AI Analysis Strategy Box */
        .ai-analysis {
            background-color: #FFF6F6;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #FFE0E0;
        }
        
        .ai-analysis h4 {
            margin: 0 0 10px 0;
            color: var(--point-red);
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ai-analysis p {
            margin: 0;
            font-size: 15px;
            line-height: 1.6;
            color: #333;
            font-weight: 500;
        }

        /* Section Title */
        .section-title {
            font-size: 22px;
            font-weight: 800;
            margin-top: 48px;
            margin-bottom: 24px;
            color: var(--text-main);
            animation: fadeIn 0.8s ease-out;
            padding-bottom: 12px;
            border-bottom: 2px solid #E5E7EB;
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 24px;
            animation: fadeInUp 0.9s ease-out;
        }

        /* Department Cards */
        .dept-card {
            background: var(--card-bg);
            border-radius: var(--card-radius);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border-top: 5px solid var(--point-black);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .dept-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-4px);
        }

        .dept-card h3 {
            font-size: 19px;
            font-weight: 700;
            margin: 0 0 16px 0;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Refresh Button Details */
        .refresh-btn {
            background: #F3F4F6;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-left: auto;
            transition: var(--transition);
            font-size: 14px;
        }

        .refresh-btn:hover {
            background: #E5E7EB;
        }

        .spin {
            animation: spin-anim 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes spin-anim {
            from { transform: rotate(0deg); }
            to { transform: rotate(180deg); }
        }

        .fade-in {
            animation: textFade 0.4s ease forwards;
        }

        @keyframes textFade {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Sub List inside dept cards */
        .dept-news-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 120px; /* To prevent jumping during refresh */
        }

        .dept-news-list li {
            position: relative;
        }

        .dept-news-list a {
            text-decoration: none;
            color: var(--text-sub);
            font-size: 15px;
            line-height: 1.5;
            padding-left: 16px;
            display: block;
            transition: all 0.2s;
        }

        .dept-news-list a:hover {
            color: var(--point-red);
        }

        .dept-news-list a::before {
            content: '-';
            position: absolute;
            left: 0;
            top: 0;
            color: #AAA;
            font-weight: 700;
        }

        .tag {
            font-size: 12px;
            font-weight: 700;
            background: #F3F4F6;
            color: #555;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 6px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .container { padding: 16px; }
            .dept-card { padding: 20px; }
        }
    </style>
</head>

            analysisEl.innerHTML = dataObj.analysis;
